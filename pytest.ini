[pytest]
# Configuration pytest pour Wind Turbine Analytics

# Répertoire contenant les tests
testpaths = tests

# Pattern de recherche des fichiers de test
python_files = test_*.py example_*.py

# Pattern de recherche des classes de test
python_classes = Test*

# Pattern de recherche des fonctions de test
python_functions = test_*

# Options par défaut
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Marqueurs personnalisés
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
